            margin-bottom: 20px; 
            background: #25252b; 
            padding: 15px; 
            border-radius: 8px;

/* Footer & Crypto Styling */

let notifDismissedFor = []; 

    function getCountdown(schedule) {
        if (!schedule || schedule.length === 0) return null;
        const now = new Date();
        const nowTime = now.getHours() * 60 + now.getMinutes();
        let nextSpawn = null;
        let minDiff = Infinity;

        schedule.forEach(timeStr => {
            const [h, m] = timeStr.split(':').map(Number);
            const spawnTime = h * 60 + m;
            if (nowTime >= spawnTime && nowTime <= spawnTime + 5) nextSpawn = "LIVE";
            let diff = spawnTime - nowTime;
            if (diff <= 0) diff += 1440;
            if (diff < minDiff && nextSpawn !== "LIVE") minDiff = diff;
        });

        if (nextSpawn === "LIVE") return '<span class="live-status">SPAWNED NOW!</span>';
        const h = Math.floor(minDiff / 60), m = minDiff % 60, s = 60 - now.getSeconds();
        return `Next: ${h}h ${m}m ${s}s`;
    }

    function updateTimers() {
        bosses.forEach(boss => {
            const timerSpan = document.getElementById(`timer-${boss.id}`);
            if (timerSpan) {
                const countdownHTML = getCountdown(boss.schedule);
                timerSpan.innerHTML = countdownHTML || '';
            }
        });
        checkUpcomingSpawns();
    }

    function checkUpcomingSpawns() {
        const now = new Date();
        const nowTime = now.getHours() * 60 + now.getMinutes();
        let upcomingHTML = "";
        let count = 0;

        bosses.forEach(boss => {
            const isCompleted = localStorage.getItem(`boss-${boss.id}`) === 'true';
            if (!boss.schedule || isCompleted) return;

            boss.schedule.forEach(timeStr => {
                const [h, m] = timeStr.split(':').map(Number);
                const spawnTime = h * 60 + m;
                const diff = spawnTime - nowTime;
                
                if (diff > 0 && diff <= 5) {
                    count++;
                    upcomingHTML += `
                        <div class="notif-item">
                            <strong>${boss.name}</strong> in ${diff}m
                            <span class="notif-area">${boss.loc}</span>
                        </div>`;
                }
            });
        });

        const toast = document.getElementById('notification-toast');
        const content = document.getElementById('notif-content');

        if (count > 0 && !toast.classList.contains('manually-closed')) {
            content.innerHTML = upcomingHTML;
            toast.style.display = 'block';
        } else if (count === 0) {
            toast.style.display = 'none';
            toast.classList.remove('manually-closed');
        }
    }

    function closeNotification() {
        const toast = document.getElementById('notification-toast');
        toast.style.display = 'none';
        toast.classList.add('manually-closed');
    }

    function initFilters() {
        const mapSelect = document.getElementById('filter-map');
        // Removed .sort() to keep the original order from the bosses array
        const areas = [...new Set(bosses.map(b => b.area))];
        areas.forEach(area => {
            const opt = document.createElement('option');
            opt.value = area; opt.innerText = area;
            mapSelect.appendChild(opt);
        });

        // Load saved selections from browser memory
        if(localStorage.getItem('filter-method')) document.getElementById('filter-method').value = localStorage.getItem('filter-method');
        if(localStorage.getItem('filter-map')) document.getElementById('filter-map').value = localStorage.getItem('filter-map');
        if(localStorage.getItem('filter-status')) document.getElementById('filter-status').value = localStorage.getItem('filter-status');
    }

    function renderTable() {
        const list = document.getElementById('boss-list');
        const cat = document.getElementById('filter-method').value;
        const map = document.getElementById('filter-map').value;
        const statusFilter = document.getElementById('filter-status').value;

        // Save current selections so they stay after hitting F5
        localStorage.setItem('filter-method', cat);
        localStorage.setItem('filter-map', map);
        localStorage.setItem('filter-status', statusFilter);

        let total = 0, completed = 0, pending = 0;
        list.innerHTML = '';
        
        bosses.forEach(boss => {
            const isCompleted = localStorage.getItem(`boss-${boss.id}`) === 'true';
            total++;
            if (isCompleted) completed++; else pending++;

            const matchesCat = (cat === 'All' || boss.type.includes(cat));
            const matchesMap = (map === 'All' || boss.area === map);
            const matchesStatus = (statusFilter === 'All' || 
                                   (statusFilter === 'Completed' && isCompleted) || 
                                   (statusFilter === 'Pending' && !isCompleted));

            if (matchesCat && matchesMap && matchesStatus) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${boss.name}</strong><br><small>${boss.cycle}</small></td>
                    <td><span class="area-tag">${boss.area}</span><br><small>${boss.loc}</small></td>
                    <td class="type-tag">${boss.type} <span id="timer-${boss.id}" class="timer-text"></span></td>
                    <td><span class="status-badge ${isCompleted ? 'completed' : 'pending'}">${isCompleted ? 'DONE' : 'PENDING'}</span></td>
                    <td><input type="checkbox" ${isCompleted ? 'checked' : ''} onchange="toggleBoss(${boss.id}, this.checked)"></td>
                `;
                list.appendChild(row);
            }
        });

        document.getElementById('count-total').innerText = total;
        document.getElementById('count-completed').innerText = completed;
        document.getElementById('count-pending').innerText = pending;
        
        updateTimers();
    }

    function toggleBoss(id, status) {
        localStorage.setItem(`boss-${id}`, status);
        renderTable();
    }

    function resetAll() {
        if (confirm("Reset all boss progress?")) {
            bosses.forEach(b => localStorage.removeItem(`boss-${b.id}`));
            renderTable();
        }
    }

    window.onload = () => {
        document.getElementById("current-year").textContent = new Date().getFullYear();
        initFilters();
        renderTable();
        setInterval(updateTimers, 1000); 
    };
    </script>
</body>
