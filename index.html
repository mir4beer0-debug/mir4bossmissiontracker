<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIR4 Boss Mission Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1d; color: #e0e0e0; padding: 20px; max-width: 1100px; margin: auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #c19a6b; padding-bottom: 10px; }
        h2 { color: #c19a6b; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        input[type="checkbox"] {
            transform: scale(2.5); /* Increases size by 50% */
            margin: 10px;          /* Add margin to prevent overlapping nearby text */
            text-align: center;
        }
        /* Fixed Position Drop-down Area */
        .filter-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            margin-bottom: 20px; 
            background: #25252b; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            position: sticky; 
            top: 10px; 
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 0.8rem; color: #c19a6b; font-weight: bold; text-transform: uppercase; }
        select { background: #1a1a1d; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; cursor: pointer; }

        .reset-btn { background-color: #8b0000; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.3s; }
        .reset-btn:hover { background-color: #ff4d4d; }

        .main-content { flex: 1; }
        table { width: 100%; border-collapse: collapse; background-color: #25252b; margin-bottom: 40px; }
        th { background-color: #333339; color: #c19a6b; padding: 12px; text-align: left; border-bottom: 2px solid #444; }
        td { padding: 12px; border-bottom: 1px solid #444; }
        
        .status-badge { padding: 10px 15px; border-radius: 4px; font-size: 0.8em; font-weight: bold; display: inline-block; min-width: 90px; text-align: center; }
        .pending { background-color: #634721; color: #fff; }
        .completed { background-color: #2e7d32; color: #fff; }
        
        /* Timer Styling */
        .timer-text { font-family: monospace; color: #ff9800; font-weight: bold; display: block; margin-top: 4px; font-size: 1.3em; }
        .live-status { color: #00ff00; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .area-tag { color: #a3be8c; font-weight: bold; }
        .type-tag { color: #ebcb8b; font-style: italic; font-size: 0.9em; }

        /* Footer Styling */
        footer { margin-top: auto; padding: 25px; text-align: center; border-top: 1px solid #444; background: #1f1f23; }
        .footer-text { color: #888; margin-bottom: 10px; font-size: 0.9em; }
        .donate-btn { color: #c19a6b; text-decoration: none; font-weight: bold; margin: 0 10px; padding: 8px 15px; border: 1px solid #c19a6b; border-radius: 4px; transition: 0.3s; display: inline-block; }
        .donate-btn:hover { background: #c19a6b; color: #1a1a1d; }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="header-container">
            <h2>MIR4 Boss Mission Tracker</h2>
            <button class="reset-btn" onclick="resetAll()">RESET PROGRESS</button>
        </div>

        <div class="filter-container">
            <div class="filter-group">
                <label>Category</label>
                <select id="filter-method" onchange="renderTable()">
                    <option value="All">All</option>
                    <option value="Spawn">Spawn Bosses</option>
                    <option value="Summon">Summon Bosses</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Map Area</label>
                <select id="filter-map" onchange="renderTable()">
                    <option value="All">All Maps</option>
                </select>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Boss Name</th>
                    <th>Location</th>
                    <th>Type / Timer</th>
                    <th>Status</th>
                    <th>Done</th>
                </tr>
            </thead>
            <tbody id="boss-list"></tbody>
        </table>
    </div>

    <footer>
        <p class="footer-text">Developed for the MIR4 Community. Support the project to keep it updated!</p>
        <b>WEMIX: mir4goons<br><br><small href="#" class="donate-btn">0x096605352effe89ac90da09a735718096b86bf6c</small><b>
    </footer>

            { id: 6, name: "Viper Queen", area: "Mirage Ship Layer 3 World 8", loc: "[World 8] Pakua Stonehall", type: "Summon", cycle: "Weekly", schedule: [] },

//World 5
            { id: 25, name: "Illusory Dream", area: "Mirage Ship Layer 3 World 5", loc: "[World 5] Nine Dragon Ice Field", type: "Spawn ( Kill 7k-8k Monsters )", cycle: "Weekly" },
            { id: 26, name: "Faluk", area: "Mirage Ship Layer 3 World 5", loc: "[World 5] Great Sabuk Wall", type: "Spawn", cycle: "Weekly", schedule: ["3:30", "6:30", "9:30", "12:30", "15:30", "18:30", "21:30", "24:30"] },
            { id: 27, name: "Tale Warper Fiend", area: "Mirage Ship Layer 3 World 5", loc: "[World 5] Illusion Temple", type: "Spawn", cycle: "Weekly", schedule: ["1:30", "4:30", "7:30", "10:30", "13:30", "16:30", "19:30", "22:30"] },
//World 3

//World 6

        ];

        function getCountdown(schedule) {
            if (!schedule || schedule.length === 0) return null;
            
            const now = new Date();
            const nowTime = now.getHours() * 60 + now.getMinutes();
            
            let nextSpawn = null;
            let minDiff = Infinity;

            schedule.forEach(timeStr => {
                const [h, m] = timeStr.split(':').map(Number);
                const spawnTime = h * 60 + m;
                
                // If it spawned within the last 5 minutes
                if (nowTime >= spawnTime && nowTime <= spawnTime + 5) {
                    nextSpawn = "LIVE";
                }

                let diff = spawnTime - nowTime;
                if (diff <= 0) diff += 1440; // Add 24 hours in minutes
                
                if (diff < minDiff && nextSpawn !== "LIVE") {
                    minDiff = diff;
                }
            });

            if (nextSpawn === "LIVE") return '<span class="live-status">SPAWNED NOW!</span>';

            const h = Math.floor(minDiff / 60);
            const m = minDiff % 60;
            const s = 60 - now.getSeconds();
            return `Next: ${h}h ${m}m ${s}s`;
        }

        function initFilters() {
            const mapSelect = document.getElementById('filter-map');
            const areas = [...new Set(bosses.map(b => b.area))];
            areas.forEach(area => {
                const opt = document.createElement('option');
                opt.value = area; opt.innerText = area;
                mapSelect.appendChild(opt);
            });
        }

        function renderTable() {
            const list = document.getElementById('boss-list');
            const cat = document.getElementById('filter-method').value;
            const map = document.getElementById('filter-map').value;

            list.innerHTML = '';
            
            bosses.filter(b => (cat === 'All' || b.type === cat) && (map === 'All' || b.area === map))
            .forEach(boss => {
                const isCompleted = localStorage.getItem(`boss-${boss.id}`) === 'true';
                const timer = getCountdown(boss.schedule);
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${boss.name}</strong><br><small>${boss.cycle}</small></td>
                    <td><span class="area-tag">${boss.area}</span><br><small>${boss.loc}</small></td>
                    <td class="type-tag">${boss.type} ${timer ? `<span class="timer-text">${timer}</span>` : ''}</td>
                    <td><span class="status-badge ${isCompleted ? 'completed' : 'pending'}">${isCompleted ? 'DONE' : 'PENDING'}</span></td>
                    <td><input type="checkbox" ${isCompleted ? 'checked' : ''} onchange="toggleBoss(${boss.id}, this.checked)"></td>
                `;
                list.appendChild(row);
            });
        }

        function toggleBoss(id, status) {
            localStorage.setItem(`boss-${id}`, status);
            renderTable();
        }

        function resetAll() {
            if (confirm("Reset all boss progress?")) {
                bosses.forEach(b => localStorage.removeItem(`boss-${b.id}`));
                renderTable();
            }
        }

        window.onload = () => {
            initFilters();
            renderTable();
            setInterval(renderTable, 1000); 
        };
    </script>
</body>
</html>
